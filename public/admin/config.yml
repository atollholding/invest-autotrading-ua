backend:
  name: github
  repo: atollholding/invest-autotrading-ua
  branch: main
  base_url: https://sveltia-cms-auth.ath-dit.workers.dev

media_folder: /public/images/uploads
public_folder: /images/uploads

collections:
  - name: site
    label: Сайт
    files:
      - name: company
        label: Компанія та контакти
        file: src/content/site/company.json
        format: json
        fields:
          - { label: Назва, name: name, widget: string }
          - { label: Назва для текстів сайту, name: displayName, widget: string }
          - { label: Коротка назва, name: shortName, widget: string }
          - { label: Повна назва, name: fullName, widget: string }
          - { label: Повна назва для сайту, name: displayFullName, widget: string }
          - { label: Скорочена юридична назва, name: legalShortName, widget: string }
          - { label: ЄДРПОУ, name: edrpou, widget: string }
          - { label: Дата заснування, name: founded, widget: string }
          - { label: Рік заснування, name: foundedYear, widget: number }
          - { label: Керівник, name: director, widget: string }
          - { label: Телефон, name: phone, widget: string }
          - { label: Телефон href, name: phoneHref, widget: string }
          - { label: E-mail, name: email, widget: string }
          - { label: E-mail href, name: emailHref, widget: string }
          - { label: Юридична адреса, name: address, widget: string }
          - { label: Коротка адреса, name: shortAddress, widget: string }
          - { label: Примітка до адреси, name: formerAddressNote, widget: string, required: false }
          - label: Координати
            name: coordinates
            widget: object
            fields:
              - { label: Latitude, name: lat, widget: number, value_type: float }
              - { label: Longitude, name: lng, widget: number, value_type: float }
              - { label: Latitude display, name: latDisplay, widget: string }
              - { label: Longitude display, name: lngDisplay, widget: string }
          - { label: Google Maps embed, name: mapsEmbed, widget: string }
          - { label: Google Maps URL, name: mapsUrl, widget: string }
          - { label: URL групи компаній, name: groupUrl, widget: string }
      - name: navigation
        label: Навігація і footer
        file: src/content/site/navigation.json
        format: json
        fields:
          - { label: Назва в шапці, name: brandLabel, widget: string }
          - label: Пункти меню
            name: items
            widget: list
            fields:
              - { label: ID сторінки, name: id, widget: select, options: [home, about, documents, contacts] }
              - { label: Назва, name: label, widget: string }
          - label: Footer
            name: footer
            widget: object
            fields:
              - label: Назва бренду
                name: brandLines
                widget: list
                field: { label: Рядок, name: line, widget: string }
              - { label: Теглайн, name: tagline, widget: string }
              - { label: Заголовок меню, name: siteHeading, widget: string }
              - { label: Заголовок контактів, name: contactsHeading, widget: string }
              - { label: Заголовок групи, name: groupHeading, widget: string }
              - { label: Посилання на групу, name: groupLabel, widget: string }
              - label: Адреса у footer
                name: addressLines
                widget: list
                field: { label: Рядок, name: line, widget: string }
              - { label: Локація внизу, name: locationLabel, widget: string }
      - name: home
        label: "Сторінка: Головна"
        file: src/content/pages/home.json
        format: json
        fields:
          - label: SEO
            name: seo
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
          - label: Hero
            name: hero
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - label: Заголовок
                name: titleLines
                widget: list
                field: { label: Рядок, name: line, widget: string }
              - { label: Номер акцентного рядка, name: emphasisLine, widget: number, value_type: int, min: -1, required: false }
              - { label: Текст, name: lead, widget: text, hint: "Можна використовувати {displayName} і {yearsSinceFounded}." }
              - { label: Основна кнопка, name: primaryAction, widget: string }
              - { label: Друга кнопка, name: secondaryAction, widget: string }
              - label: Факти
                name: facts
                widget: list
                fields:
                  - { label: Назва, name: key, widget: string }
                  - { label: Значення, name: value, widget: string }
                  - { label: Підпис, name: sub, widget: string }
          - label: Блок Про компанію
            name: about
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - label: Заголовок
                name: titleLines
                widget: list
                field: { label: Рядок, name: line, widget: string }
              - { label: Основний текст, name: lead, widget: text }
              - { label: Додатковий текст, name: text, widget: text }
              - { label: Кнопка, name: action, widget: string }
          - label: Напрями діяльності
            name: directions
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - label: Напрями
                name: items
                widget: list
                fields:
                  - { label: Номер, name: num, widget: string }
                  - { label: Назва, name: title, widget: string }
                  - { label: Опис, name: description, widget: text }
          - label: Досвід
            name: experience
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - label: Заголовок
                name: titleLines
                widget: list
                field: { label: Рядок, name: line, widget: string }
              - { label: Текст, name: lead, widget: text }
              - label: Картки досвіду
                name: items
                widget: list
                fields:
                  - { label: Категорія, name: category, widget: string }
                  - { label: Назва, name: title, widget: string }
                  - { label: Примітка, name: note, widget: string }
          - label: Документи на головній
            name: documents
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - label: Заголовок
                name: titleLines
                widget: list
                field: { label: Рядок, name: line, widget: string }
              - { label: Текст, name: lead, widget: text }
              - { label: Підпис періоду, name: periodLabel, widget: string }
              - { label: Кнопка, name: action, widget: string }
          - label: Контактний CTA
            name: location
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Заголовок, name: title, widget: string }
              - { label: Кнопка, name: action, widget: string }
      - name: about
        label: "Сторінка: Про компанію"
        file: src/content/pages/about.json
        format: json
        fields:
          - label: SEO
            name: seo
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
          - label: Hero
            name: hero
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - label: Заголовок
                name: titleLines
                widget: list
                field: { label: Рядок, name: line, widget: string }
              - { label: Текст, name: lead, widget: text }
          - label: Історія
            name: history
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - label: Заголовок
                name: titleLines
                widget: list
                field: { label: Рядок, name: line, widget: string }
              - label: Абзаци
                name: paragraphs
                widget: list
                field: { label: Абзац, name: paragraph, widget: text }
          - label: Принципи роботи
            name: principles
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - label: Принципи
                name: items
                widget: list
                fields:
                  - { label: Назва, name: title, widget: string }
                  - { label: Опис, name: description, widget: text }
          - label: Юридична інформація
            name: legal
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Група компаній, name: groupValue, widget: string }
              - { label: Кнопка документів, name: documentsAction, widget: string }
              - { label: Кнопка контактів, name: contactsAction, widget: string }
      - name: documents_page
        label: "Сторінка: Документи"
        file: src/content/pages/documents.json
        format: json
        fields:
          - label: SEO
            name: seo
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
          - label: Hero
            name: hero
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Заголовок, name: title, widget: string }
              - { label: Текст, name: lead, widget: text }
              - { label: Підпис періоду, name: periodLabel, widget: string }
          - label: Фільтри
            name: filters
            widget: object
            fields:
              - { label: Placeholder пошуку, name: searchPlaceholder, widget: string }
              - { label: ARIA label пошуку, name: searchLabel, widget: string }
              - { label: Рік, name: yearLabel, widget: string }
              - { label: Тип, name: typeLabel, widget: string }
              - { label: Всі, name: allLabel, widget: string }
          - label: Порожній результат
            name: empty
            widget: object
            fields:
              - { label: Заголовок, name: title, widget: string }
              - { label: Підказка, name: hint, widget: string }
              - { label: Кнопка очистки, name: clearAction, widget: string }
          - label: Юридичне застереження
            name: notice
            widget: object
            fields:
              - { label: Заголовок, name: title, widget: string }
              - { label: Текст, name: text, widget: text }
      - name: contacts
        label: "Сторінка: Контакти"
        file: src/content/pages/contacts.json
        format: json
        fields:
          - label: SEO
            name: seo
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
          - label: Hero
            name: hero
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - label: Заголовок
                name: titleLines
                widget: list
                field: { label: Рядок, name: line, widget: string }
          - label: Контактна картка
            name: card
            widget: object
            fields:
              - { label: Юридична назва, name: legalNameLabel, widget: string }
              - { label: Адреса, name: addressLabel, widget: string }
              - label: Рядки адреси
                name: addressLines
                widget: list
                field: { label: Рядок, name: line, widget: string }
              - { label: Кнопка копіювання адреси, name: copyAddressAction, widget: string }
              - { label: Телефон, name: phoneLabel, widget: string }
              - { label: Кнопка телефону, name: phoneAction, widget: string }
              - { label: E-mail, name: emailLabel, widget: string }
              - { label: Кнопка e-mail, name: emailAction, widget: string }
              - { label: Керівник, name: directorLabel, widget: string }
          - label: Карта
            name: map
            widget: object
            fields:
              - { label: Title iframe, name: title, widget: string }
              - { label: Кнопка карти, name: action, widget: string }
              - { label: Підпис, name: caption, widget: string }
          - label: Toast
            name: toast
            widget: object
            fields:
              - { label: Адресу скопійовано, name: addressCopied, widget: string }

  - name: issuer_documents
    label: Публікації документів
    folder: src/content/documents/groups
    create: true
    extension: json
    format: json
    identifier_field: publicationKind
    slug: "{{publishedAt}}-{{publicationKind}}-{{hour}}{{minute}}{{second}}"
    media_folder: /public/documents/uploads
    public_folder: /documents/uploads
    summary: "{{publicationKind}} · {{publishedAt}}"
    sortable_fields:
      fields: [createdAt, publishedAt, status, publicationKind]
      default:
        field: createdAt
        direction: descending
    fields:
      - { label: Дата додавання, name: createdAt, widget: hidden, default: "{{datetime}}" }
      - label: Тип публікації
        name: publicationKind
        widget: select
        hint: "Оберіть бізнес-тип документа. Назви, фільтри й службовий ID сайт сформує автоматично."
        options:
          - { label: Річна інформація, value: annual-report }
          - { label: Організаційна структура, value: organization-structure }
          - { label: Структура власності, value: ownership-structure }
          - { label: Особлива інформація, value: special-info }
          - { label: Загальні збори, value: shareholders-meeting }
          - { label: Протоколи, value: protocol }
          - { label: Для акціонерів, value: shareholder-info }
          - { label: Інформація емітента, value: issuer-info }
      - { label: Дата публікації, name: publishedAt, widget: datetime, date_format: "YYYY-MM-DD", time_format: false, hint: "Дата, з якою документ має з'явитися в архіві." }
      - { label: Звітний рік, name: reportingYear, widget: string, required: false, pattern: ["^(|20[0-9]{2}|19[0-9]{2})$", "Вкажіть рік у форматі 2025 або залиште порожнім."], hint: "Для річної інформації: наприклад 2025. Для інших документів можна залишити порожнім, якщо є дата 'станом на'." }
      - { label: Станом на / кінець періоду, name: periodEnd, widget: datetime, date_format: "YYYY-MM-DD", time_format: false, required: false, hint: "Для структури власності або організаційної структури: наприклад 2025-12-31." }
      - label: Файли публікації
        name: files
        widget: file
        multiple: true
        min: 1
        accept: ".pdf,.doc,.docx,.rtf,.xml,.p7s,.zip"
        hint: "Додайте весь пакет файлів одразу: документ, підпис .p7s, XML-звіт і підпис XML, якщо вони є. Ролі, зв'язки підписів, розмір і SHA-256 сайт визначить автоматично."
      - label: Статус
        name: status
        widget: select
        default: draft
        options:
          - { label: Чернетка, value: draft }
          - { label: Опубліковано, value: published }
        hint: "Чернетки зберігаються в репозиторії, але не показуються на сайті."
      - label: Додатково
        name: advanced
        widget: object
        required: false
        collapsed: true
        hint: "Не відкривати для стандартних нових публікацій. Це ручні override-поля для нестандартних або архівних записів; сайт і так автоматично сформує ID, назви, ролі файлів і checksum."
        fields:
          - { label: Стабільний ID, name: id, widget: string, required: false, hint: "Для старих записів не змінювати. Для нових зазвичай залишати порожнім." }
          - { label: Повна назва вручну, name: titleOverride, widget: string, required: false, hint: "Якщо порожньо, сайт сформує назву автоматично." }
          - { label: Коротка назва вручну, name: displayTitleOverride, widget: string, required: false, hint: "Якщо порожньо, сайт сформує коротку назву автоматично." }
