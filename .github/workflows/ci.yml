name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  check:
    name: Check and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate document manifest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm run manifest

      - name: Commit generated document manifest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if git diff --quiet -- src/content/documents/manifest.json public/_redirects; then
            echo "Document manifest is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/documents/manifest.json public/_redirects
          git commit -m "chore(documents): update generated archive manifest"
          git push

      - name: Check
        run: npm run check

      - name: Build
        run: npm run build
